{% load static %}
<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Guia de Serviços - UEMS Acolhe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --azul-marinho: #1C3384;
            --fundo-creme: #FDF9F1;
            /* Cores padrão importadas da Home */
            --verde-musgo: #3A6B42; 
            --azul-educacao: #2c4988;
            --marrom-transporte: #854510;
            --roxo-docs: #412384;
            --cinza-padrao: #6c757d;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--fundo-creme);
            background-image: url('{% static "imagens/fundos.png" %}');
            background-size: cover; 
            background-position: top center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .navbar-custom {
            background-color: var(--azul-marinho);
            padding: 15px 5%;
            border-radius: 0 0 50% 10% / 0 0 40px 15px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .navbar-brand { font-family: 'Baloo 2', cursive; color: white !important; font-size: 1.8rem; font-weight: 800; text-decoration: none;}
        
        .conteudo-fundo { 
            background: rgba(253, 249, 241, 0.85); 
            backdrop-filter: blur(5px); 
            border-radius: 40px 40px 0 0; 
            padding: 40px 5% 60px 5%; 
            margin-top: 40px;
            min-height: 80vh; 
        }

        h1 { font-family: 'Baloo 2', cursive; color: var(--azul-marinho); }

        /* Estilo dos Cards idênticos aos da Home */
        .card-custom { 
            background: white; border-radius: 20px; padding: 25px 20px; 
            text-align: center; height: 100%; transition: 0.3s; border: none; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); display: flex; flex-direction: column; justify-content: center;
        }
        .card-custom:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }

        .icon-box { display: inline-flex; align-items: center; gap: 10px; justify-content: center; margin-bottom: 15px;}
        .icon-box i { font-size: 1.5rem; }
        .card-title { font-family: 'Baloo 2', cursive; font-size: 1.4rem; font-weight: 800; margin: 0;}
        
        .btn-card { border-radius: 20px; font-weight: 700; padding: 8px 0; text-decoration: none; color: white; display: block; width: 100%; transition: 0.3s; margin-top: auto;}

        /* Cores Dinâmicas */
        .text-saude { color: var(--verde-musgo); }
        .bg-saude { background-color: var(--verde-musgo); } .bg-saude:hover{ background-color: #0d2f11; color:white;}

        .text-educacao { color: var(--azul-educacao); }
        .bg-educacao { background-color: var(--azul-educacao); } .bg-educacao:hover{ background-color: #3860b8; color:white;}

        .text-transporte { color: var(--marrom-transporte); }
        .bg-transporte { background-color: var(--marrom-transporte); } .bg-transporte:hover{ background-color: #b3611d; color:white;}

        .text-docs { color: var(--roxo-docs); }
        .bg-docs { background-color: var(--roxo-docs); } .bg-docs:hover{ background-color: #6e46c7; color:white;}

        .text-padrao { color: var(--cinza-padrao); }
        .bg-padrao { background-color: var(--cinza-padrao); } .bg-padrao:hover{ background-color: #495057; color:white;}

        .btn-voltar { font-weight: 700; border-radius: 30px; padding: 8px 20px; transition: 0.3s; }
    </style>
  </head>
  <body>

    <nav class="navbar-custom d-flex justify-content-between align-items-center">
        <a class="navbar-brand m-0" href="{% url 'home' %}">UEMS Acolhe</a>
        <a href="{% url 'home' %}" class="btn btn-outline-light btn-voltar">← Voltar</a>
    </nav>

    <div class="conteudo-fundo">
        <div class="container">
            <div class="text-center mb-5">
                <h1 class="fw-bold">🧭 Guia de Serviços e Direitos</h1>
                <p class="lead text-muted fw-bold">Informações essenciais para facilitar sua vida no Brasil.</p>
            </div>

            <div class="row g-4">
                {% for categoria in categorias %}
                <div class="col-12 col-md-6 col-lg-3">
                    <div class="card-custom">
                        <div class="icon-box 
                            {% if 'Saúde' in categoria.nome %} text-saude 
                            {% elif 'Doc' in categoria.nome %} text-docs 
                            {% elif 'Edu' in categoria.nome %} text-educacao 
                            {% elif 'Tran' in categoria.nome %} text-transporte 
                            {% else %} text-padrao {% endif %}">
                            
                            <i class="fa-solid 
                                {% if 'Saúde' in categoria.nome %} fa-heart-pulse 
                                {% elif 'Doc' in categoria.nome %} fa-id-card 
                                {% elif 'Edu' in categoria.nome %} fa-book 
                                {% elif 'Tran' in categoria.nome %} fa-bus 
                                {% else %} fa-thumbtack {% endif %}">
                            </i>
                            <h3 class="card-title">{{ categoria.nome }}</h3>
                        </div>

                        <a href="{% url 'detalhe_categoria' categoria.id %}" class="btn-card 
                            {% if 'Saúde' in categoria.nome %} bg-saude 
                            {% elif 'Doc' in categoria.nome %} bg-docs 
                            {% elif 'Edu' in categoria.nome %} bg-educacao 
                            {% elif 'Tran' in categoria.nome %} bg-transporte 
                            {% else %} bg-padrao {% endif %}">
                            Saiba mais
                        </a>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
